<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 Rotisería Delicias - Sabores que enamoran</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== RESET Y VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e63946;
            --primary-dark: #c62828;
            --primary-light: #ff6b6b;
            --secondary: #1a1a2e;
            --accent: #fdcb6e;
            --accent-light: #ffeaa7;
            --gold: #f39c12;
            --cream: #fdf6f0;
            --dark: #0a0a1a;
            --text: #2d3436;
            --text-light: #636e72;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.15);
            --shadow-hover: 0 30px 80px rgba(230, 57, 70, 0.25);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cream);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 2rem;
            transition: var(--transition);
        }

        header.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 75px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            font-family: 'Playfair Display', serif;
        }

        .logo i {
            font-size: 2rem;
            background: var(--primary);
            color: white;
            padding: 8px;
            border-radius: 12px;
            transition: var(--transition);
        }

        .logo:hover i {
            transform: rotate(-10deg) scale(1.05);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2.5px;
            background: var(--primary);
            border-radius: 10px;
            transition: var(--transition);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-menu a:hover {
            color: var(--primary);
        }

        .admin-btn {
            background: var(--secondary);
            color: white !important;
            padding: 10px 20px;
            border-radius: 50px;
            transition: var(--transition);
            font-weight: 600 !important;
        }

        .admin-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.3);
        }

        .admin-btn::after {
            display: none !important;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--secondary);
            transition: var(--transition);
            background: var(--cream);
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-icon:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 100px 2rem 60px;
            background: linear-gradient(135deg, #fdf6f0 0%, #f8e8e0 50%, #fdf6f0 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 70%;
            height: 150%;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '🍕';
            position: absolute;
            bottom: 10%;
            right: 5%;
            font-size: 12rem;
            opacity: 0.06;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            color: var(--secondary);
        }

        .hero-text h1 .highlight {
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        .hero-text h1 .highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 14px;
            background: var(--accent-light);
            opacity: 0.5;
            border-radius: 10px;
            z-index: -1;
        }

        .hero-text .subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 2.5rem;
            max-width: 500px;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            color: white;
            padding: 16px 36px;
            border: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(230, 57, 70, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(230, 57, 70, 0.4);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            color: var(--secondary);
            padding: 16px 36px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(230, 57, 70, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero-image .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-image .floating-badge {
            position: absolute;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: float-badge 4s ease-in-out infinite;
        }

        .hero-image .floating-badge:nth-child(2) {
            top: 10%;
            right: -10%;
            animation-delay: 0.5s;
        }

        .hero-image .floating-badge:nth-child(3) {
            bottom: 15%;
            left: -10%;
            animation-delay: 1s;
        }

        @keyframes float-badge {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .floating-badge .icon {
            font-size: 1.8rem;
        }
        .floating-badge .text { font-weight: 600; font-size: 0.9rem; }
        .floating-badge .sub { font-size: 0.7rem; color: var(--text-light); }

        /* ===== INDICADOR DE CONEXIÓN ===== */
        #connectionStatus {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        #statusDot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .hero-text h1 {
                font-size: 3.5rem;
            }
            
            .hero-image .floating-badge {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 120px 1.5rem 40px;
            }

            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 2rem;
            }

            .hero-text h1 {
                font-size: 2.8rem;
            }

            .hero-text .subtitle {
                margin: 0 auto 2rem;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-image .image-wrapper {
                max-width: 350px;
            }

            .nav-menu {
                gap: 1rem;
                font-size: 0.85rem;
            }

            .nav-menu a:not(.admin-btn) {
                display: none;
            }

            header {
                padding: 0 1rem;
            }

            .admin-btn {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .hero-text h1 {
                font-size: 2.2rem;
            }

            .btn-primary,
            .btn-secondary {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header id="header">
        <div class="header-container">
            <a href="#" class="logo">
                <i class="fas fa-utensils"></i>
                Delicias
            </a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="#menu" class="active">Menú</a></li>
                    <li><a href="#como-pedir">Cómo Pedir</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                    <li><a href="admin.html" class="admin-btn"><i class="fas fa-user-shield"></i> Admin</a></li>
                </ul>
            </nav>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h1>
                    Sabores que <br>
                    <span class="highlight">enamoran</span>
                </h1>
                <p class="subtitle">
                    Las mejores empanadas, pizzas, lomitos y hamburguesas de la ciudad. 
                    Hechas con amor y los mejores ingredientes.
                </p>
                <div class="hero-buttons">
                    <a href="#menu" class="btn-primary">
                        <i class="fas fa-arrow-right"></i> Ver Menú
                    </a>
                    <a href="#como-pedir" class="btn-secondary">
                        <i class="fas fa-info-circle"></i> Cómo Pedir
                    </a>
                </div>
            </div>
            <div class="hero-image">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&h=600&fit=crop" alt="Pizza Deliciosa">
                </div>
                <div class="floating-badge" style="top: 10%; right: -10%;">
                    <span class="icon">⭐</span>
                    <div>
                        <div class="text">4.9/5</div>
                        <div class="sub">Clientes felices</div>
                    </div>
                </div>
                <div class="floating-badge" style="bottom: 15%; left: -10%;">
                    <span class="icon">🏆</span>
                    <div>
                        <div class="text">+1000</div>
                        <div class="sub">Pedidos entregados</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== INDICADOR DE CONEXIÓN ===== -->
    <div id="connectionStatus">
        <span id="statusDot"></span>
        <span id="statusText">Conectando...</span>
    </div>

    <!-- ===== RESTO DEL CONTENIDO (menú, carrito, etc.) ===== -->
    <!-- ... (el resto del código de tu index.html va acá) ... -->

    <script>
        // ===== HEADER SCROLL EFFECT =====
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // ===== CONNECTION STATUS =====
        function updateConnectionStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const container = document.getElementById('connectionStatus');
            
            if (navigator.onLine) {
                container.style.background = 'rgba(46, 125, 50, 0.95)';
                container.style.color = 'white';
                dot.style.background = '#4caf50';
                text.textContent = 'Online';
            } else {
                container.style.background = 'rgba(198, 40, 40, 0.95)';
                container.style.color = 'white';
                dot.style.background = '#ff5252';
                text.textContent = 'Offline - Datos locales';
            }
        }

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();
    </script>

</body>
</html>
